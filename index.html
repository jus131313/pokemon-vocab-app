<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物小精靈認字大冒險</title>
    <style>
        /* --- 官方 Pokedex 風格配色 --- */
        :root {
            --poke-red: #E3350D;
            --poke-dark: #1A1A1A;
            --poke-grey: #F2F2F2;
            --poke-blue: #30A7D7;
            --tech-font: 'Arial', '微軟正黑體', sans-serif;
        }

        body {
            margin: 0; background: url('https://www.transparenttextures.com/patterns/cubes.png') var(--poke-grey);
            font-family: var(--tech-font); color: var(--poke-dark);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- 頂部導航列 --- */
        .header {
            background: var(--poke-red); color: white; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 5px solid var(--poke-dark);
            position: relative; z-index: 10;
        }
        .header-title { font-size: 1.5rem; font-weight: bold; font-style: italic; letter-spacing: 2px; }
        
        .led-container { display: flex; gap: 10px; }
        .led { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; }
        .led.red { background: #ff5959; box-shadow: 0 0 10px #ff5959; animation: blink 2s infinite; }
        .led.yellow { background: #fbd743; }
        .led.green { background: #4caf50; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- 頁面切換 --- */
        .screen { display: none; width: 100%; height: calc(100vh - 60px); flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .screen.active { display: flex; }

        /* --- 主頁 & 關卡頁 --- */
        .btn-main { background: var(--poke-dark); color: white; font-size: 1.5rem; padding: 15px 50px; border-radius: 8px; border: 2px solid var(--poke-dark); cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-main:hover { background: var(--poke-red); transform: scale(1.05); }

        .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 800px; margin-top: 20px; }
        .level-card { background: white; border: 3px solid var(--poke-dark); border-radius: 10px; width: 120px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; box-shadow: 5px 5px 0px rgba(0,0,0,0.1); overflow: hidden; }
        .level-card:hover { transform: translateY(-5px); box-shadow: 5px 10px 0px rgba(0,0,0,0.2); border-color: var(--poke-blue); }
        .level-card.locked { opacity: 0.6; pointer-events: none; }
        .level-card.locked .poke-thumb { filter: brightness(0); opacity: 0.5; }
        
        .level-num { font-size: 1.2rem; font-weight: bold; background: var(--poke-dark); color: white; width: 100%; text-align: center; padding: 5px 0; }
        .poke-thumb { width: 90px; height: 90px; object-fit: contain; margin-bottom: 10px; transition: filter 0.3s; }

        /* --- 學習與考核版面 --- */
        .game-layout { display: flex; width: 90%; max-width: 1000px; height: 80%; gap: 20px; }
        
        .left-panel { flex: 1; background: white; border: 5px solid var(--poke-dark); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        .word-display { font-size: 4rem; font-weight: bold; color: var(--poke-dark); margin-bottom: 10px; text-shadow: 2px 2px 0px #eee; text-align: center; }
        .word-emoji { font-size: 4rem; margin-bottom: 20px; }
        
        .btn-learn { background: var(--poke-blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; cursor: pointer; margin-bottom: 20px; transition: 0.2s; font-weight: bold;}
        .btn-learn:hover { background: #2488b1; transform: scale(1.05); }

        .btn-mic { background: var(--poke-red); color: white; width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--poke-dark); font-size: 2.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 5px 10px rgba(227, 53, 13, 0.4); }
        .btn-mic:active { transform: scale(0.9); }
        .btn-mic.listening { animation: pulse-red 1s infinite; background: #ff5959; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(227, 53, 13, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(227, 53, 13, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 53, 13, 0); } }

        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .mystery-box { background: var(--poke-dark); flex: 1; border-radius: 15px; border: 5px solid #555; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .mystery-bg { position: absolute; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #222 10px, #222 20px); z-index: 1; }
        
        .target-pokemon { width: 220px; height: 220px; object-fit: contain; z-index: 2; filter: brightness(0); transition: filter 2s ease-in-out, transform 1s; }
        .target-pokemon.revealed { filter: brightness(1); transform: scale(1.2) drop-shadow(0 0 20px gold); }

        .rocket-panel { background: white; border: 4px solid #6c5ce7; border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; }
        .rocket-img { width: 60px; height: 60px; background: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/52.png') center/cover; border-radius: 50%; border: 3px solid #6c5ce7; flex-shrink: 0; }
        .rocket-dialogue { flex: 1; font-weight: bold; font-size: 1.1rem; color: #333; }

        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--poke-blue); width: 0%; transition: 0.3s; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
        
        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 990; }
        .flash-active { opacity: 1; }

        /* --- 自訂解鎖成功畫面 --- */
        .success-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .success-modal.active { display: flex; animation: pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-content { background: var(--poke-dark); border: 5px solid gold; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 400px; }
        .modal-img { width: 150px; height: 150px; object-fit: contain; filter: drop-shadow(0 0 15px gold); margin: 20px 0; }
        .modal-btn { background: var(--poke-red); color: white; padding: 10px 30px; font-size: 1.2rem; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        @keyframes pop-in { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* =========================================
           手機響應式設計 (Responsive Design)
           ========================================= */
        @media (max-width: 768px) {
            .header { flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
            .header div { font-size: 1.2rem; width: 100%; text-align: center; }
            .header button { width: 100%; }

            /* 關卡網格改為 2 欄 */
            .level-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .level-card { width: auto; height: auto; padding-bottom: 10px; }

            /* 戰鬥畫面轉為上下排版，允許滑動 */
            .screen { height: auto; min-height: 100vh; overflow-y: auto; padding-bottom: 20px; justify-content: flex-start; }
            .game-layout { flex-direction: column; width: 95%; height: auto; margin-top: 20px; }
            
            .left-panel { padding: 15px; }
            .word-text { font-size: 3rem; margin: 10px 0; }
            
            .pokedex-view { height: 180px; }
            .target-pokemon { width: 150px; height: 150px; }
            .mystery-box { min-height: 200px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="led-container">
            <div class="led red"></div><div class="led yellow"></div><div class="led green"></div>
        </div>
        <div class="header-title">寵物小精靈認字大冒險</div>
        <button onclick="navTo('home-screen')" style="background:transparent; border:1px solid white; color:white; padding:8px 15px; cursor:pointer; border-radius:5px; font-weight:bold;">返回首頁</button>
    </div>

    <!-- 1. 首頁 -->
    <div id="home-screen" class="screen active">
        <h1 style="font-size: 2.5rem; color: var(--poke-red); text-shadow: 2px 2px white; margin-bottom: 40px; text-align: center;">認字大冒險</h1>
        <button class="btn-main" onclick="navTo('level-screen')">開啟圖鑑</button>
    </div>

    <!-- 2. 關卡選擇頁 -->
    <div id="level-screen" class="screen">
        <h2 style="font-size: 2rem; margin-top: 20px;">選擇學習區域</h2>
        <div class="level-grid" id="level-grid">
            <!-- JS 自動生成 -->
        </div>
    </div>

    <!-- 3. 學習與考核頁 -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            <!-- 左側 -->
            <div class="left-panel" id="card-panel">
                <div class="word-emoji" id="card-emoji">🍎</div>
                <div class="word-display" id="card-name">蘋果</div>
                
                <button class="btn-learn" onclick="playVoice()">🔊 聽下點讀</button>
                
                <button class="btn-mic" id="mic-btn" onclick="startListening()">🎤</button>
                <div style="margin-top:15px; font-weight:bold; color:#666; text-align:center;" id="mic-status">撳個咪，大聲讀出中文字！</div>
                
                <div class="progress-bar"><div class="progress-fill" id="prog-bar"></div></div>
            </div>

            <!-- 右側 -->
            <div class="right-panel">
                <div class="mystery-box">
                    <div class="mystery-bg"></div>
                    <img src="" alt="Target Pokemon" class="target-pokemon" id="mystery-poke">
                </div>
                
                <div class="rocket-panel">
                    <div class="rocket-img"></div>
                    <div class="rocket-dialogue" id="rocket-text">既然你誠心誠意咁發問... 就大聲讀出嚟聽下！</div>
                </div>
            </div>
        </div>
    </div>

    <div class="flash-overlay" id="flash-bg"></div>

    <!-- 4. 自訂解鎖成功畫面 -->
    <div class="success-modal" id="success-modal">
        <div class="modal-content">
            <h2 style="color: gold; margin-top: 0; font-size: 2rem;">解鎖成功！</h2>
            <img src="" alt="Unlocked" class="modal-img" id="modal-reward-img">
            <h3 style="font-size: 1.5rem;">你收服咗【<span id="modal-reward-name"></span>】！</h3>
            <button class="modal-btn" onclick="closeSuccessModal()">返回圖鑑</button>
        </div>
    </div>

    <script>
        // --- 廣東話語音辨識 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-HK';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        } else {
            alert("你嘅瀏覽器唔支援語音辨識，請用 Google Chrome！");
        }

        // --- 數據庫 ---
        const vocabDB = {
            1: { 
                name: '食物區', rewardName: '小火龍', rewardImg: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png',
                words: [{ word: '蘋果', emoji: '🍎' }, { word: '香蕉', emoji: '🍌' }, { word: '西瓜', emoji: '🍉' }]
            },
            2: { 
                name: '交通區', rewardName: '車厘龜', rewardImg: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png',
                words: [{ word: '巴士', emoji: '🚌' }, { word: '飛機', emoji: '✈️' }, { word: '單車', emoji: '🚲' }]
            },
            3: { 
                name: '自然區', rewardName: '奇異種子', rewardImg: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png',
                words: [{ word: '太陽', emoji: '☀️' }, { word: '月亮', emoji: '🌙' }, { word: '星星', emoji: '⭐' }]
            },
            4: {
                name: '動物區', rewardName: '比卡超', rewardImg: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png',
                words: [{ word: '貓', emoji: '🐱' }, { word: '狗', emoji: '🐶' }, { word: '兔', emoji: '🐰' }]
            }
        };
        for(let i=5; i<=8; i++) { vocabDB[i] = vocabDB[1]; } 

        let unlockedLevels = 1;
        let currentLevel = 1;
        let questionIndex = 0;
        let currentLevelData = null;

        // --- 導航 ---
        function navTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'level-screen') renderLevels();
            document.getElementById('mystery-poke').classList.remove('revealed');
        }

        // --- 渲染關卡 ---
        function renderLevels() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const isUnlocked = i <= unlockedLevels;
                const imgUrl = vocabDB[i].rewardImg;
                const areaName = vocabDB[i].name || `區域 ${i}`;
                
                grid.innerHTML += `
                    <div class="level-card ${isUnlocked ? '' : 'locked'}" onclick="if(${isUnlocked}) startLevel(${i})">
                        <div class="level-num">${areaName}</div>
                        <img src="${imgUrl}" class="poke-thumb" alt="Pokemon">
                    </div>
                `;
            }
        }

        function startLevel(level) {
            currentLevel = level;
            currentLevelData = vocabDB[level];
            questionIndex = 0;
            
            document.getElementById('mystery-poke').src = currentLevelData.rewardImg;
            document.getElementById('rocket-text').innerText = "準備好未？大聲讀出畫面嘅中文字！";
            
            navTo('game-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const data = currentLevelData.words[questionIndex];
            document.getElementById('card-name').innerText = data.word;
            document.getElementById('card-emoji').innerText = data.emoji;
            document.getElementById('prog-bar').style.width = ((questionIndex / currentLevelData.words.length) * 100) + '%';
        }

        // --- 廣東話 TTS ---
        function playVoice() {
            const word = document.getElementById('card-name').innerText;
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'zh-HK';
            window.speechSynthesis.speak(msg);
            document.getElementById('rocket-text').innerText = "聽清楚喇！就係咁讀！";
        }

        // --- 廣東話 STT ---
        function startListening() {
            if(!recognition) return;
            const btn = document.getElementById('mic-btn');
            const status = document.getElementById('mic-status');
            
            btn.classList.add('listening');
            status.innerText = "聽緊喇... 請讀！";
            status.style.color = "var(--poke-red)";

            recognition.start();

            recognition.onresult = (event) => {
                const spokenWord = event.results[0][0].transcript;
                checkAnswer(spokenWord);
            };

            recognition.onspeechend = () => {
                recognition.stop();
                btn.classList.remove('listening');
                status.innerText = "撳個咪，大聲讀出中文字！";
                status.style.color = "#666";
            };

            recognition.onerror = (event) => {
                btn.classList.remove('listening');
                status.innerText = "收唔到音呀，再講多次？";
            };
        }

        function checkAnswer(spokenWord) {
            const correctWord = currentLevelData.words[questionIndex].word;
            
            if (spokenWord.includes(correctWord)) {
                document.getElementById('rocket-text').innerText = `「${spokenWord}」？好嘢，答啱咗！`;
                
                questionIndex++;
                if (questionIndex >= currentLevelData.words.length) {
                    revealPokemon();
                } else {
                    setTimeout(loadQuestion, 1000);
                }
            } else {
                document.getElementById('card-panel').classList.add('shake');
                document.getElementById('rocket-text').innerText = `你講「${spokenWord}」？唔係好啱音喎，再試下！`;
                setTimeout(() => document.getElementById('card-panel').classList.remove('shake'), 400);
            }
        }

        // --- 解鎖與自訂 UI 提示 ---
        function revealPokemon() {
            document.getElementById('rocket-text').innerText = "白洞，白色的明天在等著我們... 竟然解鎖咗？！";
            document.getElementById('flash-bg').classList.add('flash-active');
            document.getElementById('prog-bar').style.width = '100%';

            setTimeout(() => {
                document.getElementById('flash-bg').classList.remove('flash-active');
                document.getElementById('mystery-poke').classList.add('revealed');
                
                setTimeout(() => {
                    showSuccessModal(currentLevelData.rewardName, currentLevelData.rewardImg);
                }, 1500);
            }, 800);
        }

        function showSuccessModal(name, imgUrl) {
            document.getElementById('modal-reward-name').innerText = name;
            document.getElementById('modal-reward-img').src = imgUrl;
            document.getElementById('success-modal').classList.add('active');
            
            if(currentLevel >= unlockedLevels && currentLevel < 8) unlockedLevels++;
        }

        function closeSuccessModal() {
            document.getElementById('success-modal').classList.remove('active');
            navTo('level-screen');
        }
    </script>
</body>
</html>
