<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon 識字大冒險</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 頂部資訊欄 -->
        <div class="hud">
            <div id="level-indicator">LEVEL: <span id="current-level">1</span></div>
            <div id="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <!-- 3D 識字卡 -->
        <div id="card-stage">
            <div id="vocab-card" class="card-3d">
                <h1 id="vocab-text">Apple</h1>
            </div>
        </div>

        <!-- 選擇按鈕 -->
        <div id="options-grid">
            <button class="btn-3d" onclick="checkAnswer(0)">蘋果</button>
            <button class="btn-3d" onclick="checkAnswer(1)">香蕉</button>
            <button class="btn-3d" onclick="checkAnswer(2)">橙</button>
        </div>

        <!-- 進化動畫遮罩層 -->
        <div id="evo-overlay" class="hidden">
            <div class="evo-white-flash"></div>
            <div class="evo-content">
                <div id="evo-target"></div>
                <h2 id="evo-message">進步中...</h2>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
