<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶可夢官方圖鑑識字系統</title>
    <style>
        /* --- 官方 Pokedex 風格配色 --- */
        :root {
            --poke-red: #E3350D;
            --poke-dark: #1A1A1A;
            --poke-grey: #F2F2F2;
            --poke-blue: #30A7D7;
            --tech-font: 'Arial', '微軟正黑體', sans-serif;
        }

        body {
            margin: 0; background: url('https://www.transparenttextures.com/patterns/cubes.png') var(--poke-grey);
            font-family: var(--tech-font); color: var(--poke-dark);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- 頂部導航列 --- */
        .header {
            background: var(--poke-red); color: white; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 5px solid var(--poke-dark);
            position: relative; z-index: 10;
        }
        .header-title { font-size: 1.5rem; font-weight: bold; font-style: italic; letter-spacing: 2px; }
        
        /* 裝飾性 LED 燈 */
        .led-container { display: flex; gap: 10px; }
        .led { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; }
        .led.red { background: #ff5959; box-shadow: 0 0 10px #ff5959; animation: blink 2s infinite; }
        .led.yellow { background: #fbd743; }
        .led.green { background: #4caf50; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* --- 頁面切換 --- */
        .screen { display: none; width: 100%; height: calc(100vh - 60px); flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .screen.active { display: flex; }

        /* --- 主頁 & 關卡頁 --- */
        .btn-main { background: var(--poke-dark); color: white; font-size: 1.5rem; padding: 15px 50px; border-radius: 8px; border: 2px solid var(--poke-dark); cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); }
        .btn-main:hover { background: var(--poke-red); transform: scale(1.05); }

        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; max-width: 800px; margin-top: 20px; }
        .level-card { background: white; border: 3px solid var(--poke-dark); border-radius: 10px; width: 100px; height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 5px 5px 0px rgba(0,0,0,0.1); }
        .level-card:hover { transform: translateY(-5px); box-shadow: 5px 10px 0px rgba(0,0,0,0.2); border-color: var(--poke-blue); }
        .level-card.locked { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
        .level-num { font-size: 1.2rem; font-weight: bold; background: var(--poke-dark); color: white; width: 100%; text-align: center; padding: 5px 0; margin-bottom: auto; border-top-left-radius: 6px; border-top-right-radius: 6px; }

        /* --- 學習與考核版面 (圖鑑 UI) --- */
        .game-layout { display: flex; width: 90%; max-width: 1000px; height: 80%; gap: 20px; }
        
        /* 左側：生字卡與語音區 */
        .left-panel { flex: 1; background: white; border: 5px solid var(--poke-dark); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        
        .word-display { font-size: 4rem; font-weight: bold; color: var(--poke-dark); margin-bottom: 10px; }
        .word-emoji { font-size: 5rem; margin-bottom: 20px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); }
        
        /* 學習按鈕 (TTS) */
        .btn-learn { background: var(--poke-blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 1.2rem; cursor: pointer; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn-learn:hover { background: #2488b1; transform: scale(1.05); }

        /* 語音作答按鈕 (STT) */
        .btn-mic { background: var(--poke-red); color: white; width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--poke-dark); font-size: 2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 5px 10px rgba(227, 53, 13, 0.4); }
        .btn-mic:active { transform: scale(0.9); }
        .btn-mic.listening { animation: pulse-red 1s infinite; background: #ff5959; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(227, 53, 13, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(227, 53, 13, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 53, 13, 0); } }

        /* 右側：黑影圖鑑與火箭兵團 */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        .mystery-box { background: var(--poke-dark); flex: 1; border-radius: 15px; border: 5px solid #555; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .mystery-bg { position: absolute; width: 100%; height: 100%; background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #222 10px, #222 20px); z-index: 1; }
        /* 黑影精靈樣式 */
        .target-pokemon { font-size: 8rem; z-index: 2; filter: brightness(0) invert(0); transition: filter 2s ease-in-out, transform 1s; }
        .target-pokemon.revealed { filter: brightness(1) invert(0); transform: scale(1.2) drop-shadow(0 0 20px gold); }

        /* 火箭兵團旁白區 */
        .rocket-panel { background: white; border: 4px solid #6c5ce7; border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; position: relative; }
        /* 替換為你的高清火箭兵團圖片網址 */
        .rocket-img { width: 80px; height: 80px; background: url('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/52.png') center/cover; border-radius: 50%; border: 3px solid #6c5ce7; }
        .rocket-dialogue { flex: 1; font-weight: bold; font-size: 1.1rem; color: #333; }

        /* 進度條 */
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--poke-blue); width: 0%; transition: 0.3s; }

        /* 物理特效 */
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
        
        /* 進化白光 */
        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 999; }
        .flash-active { opacity: 1; }
    </style>
</head>
<body>

    <!-- 頂部圖鑑導航 -->
    <div class="header">
        <div class="led-container">
            <div class="led red"></div>
            <div class="led yellow"></div>
            <div class="led green"></div>
        </div>
        <div class="header-title">POKÉDEX LEARNING SYSTEM</div>
        <button onclick="navTo('home-screen')" style="background:transparent; border:1px solid white; color:white; padding:5px 10px; cursor:pointer; border-radius:5px;">返回首頁</button>
    </div>

    <!-- 1. 首頁 -->
    <div id="home-screen" class="screen active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo" width="300" style="margin-bottom: 30px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));">
        <button class="btn-main" onclick="navTo('level-screen')">開啟圖鑑</button>
    </div>

    <!-- 2. 關卡選擇頁 (黑影預覽) -->
    <div id="level-screen" class="screen">
        <h2 style="font-size: 2rem;">選擇圖鑑區域</h2>
        <div class="level-grid" id="level-grid">
            <!-- JS 生成 -->
        </div>
    </div>

    <!-- 3. 學習與考核頁 -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            
            <!-- 左側：發音與收音區 -->
            <div class="left-panel" id="card-panel">
                <div class="word-emoji" id="card-emoji">🍎</div>
                <div class="word-display" id="card-name">Apple</div>
                
                <!-- 學習模式：系統讀出 -->
                <button class="btn-learn" onclick="playVoice()">
                    🔊 聆聽讀音 (學習)
                </button>
                
                <!-- 考核模式：小朋友讀出 -->
                <button class="btn-mic" id="mic-btn" onclick="startListening()">🎤</button>
                <div style="margin-top:10px; font-weight:bold; color:#666;" id="mic-status">點擊咪高峰，大聲讀出英文！</div>
                
                <div class="progress-bar"><div class="progress-fill" id="prog-bar"></div></div>
            </div>

            <!-- 右側：黑影圖鑑與火箭兵團 -->
            <div class="right-panel">
                <div class="mystery-box">
                    <div class="mystery-bg"></div>
                    <div class="target-pokemon" id="mystery-poke">🐲</div>
                </div>
                
                <div class="rocket-panel">
                    <!-- 你可以喺呢度換火箭兵團嘅圖片 URL -->
                    <div class="rocket-img"></div>
                    <div class="rocket-dialogue" id="rocket-text">既然你誠心誠意咁發問... 就大聲讀出嚟聽下！</div>
                </div>
            </div>

        </div>
    </div>

    <div class="flash-overlay" id="flash-bg"></div>

    <script>
        // --- 語音辨識設定 (Speech-to-Text) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; // 考核英文發音
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        } else {
            alert("你嘅瀏覽器唔支援語音辨識功能，建議使用 Google Chrome！");
        }

        // --- 數據庫 (加入關卡獎勵精靈) ---
        const vocabDB = {
            1: { 
                reward: '🐉', rewardName: '噴火龍',
                words: [
                    { en: 'Apple', zh: '蘋果', emoji: '🍎' },
                    { en: 'Banana', zh: '香蕉', emoji: '🍌' },
                    { en: 'Cat', zh: '貓', emoji: '🐱' },
                    { en: 'Dog', zh: '狗', emoji: '🐶' }
                ]
            },
            2: { 
                reward: '🐢', rewardName: '水箭龜',
                words: [
                    { en: 'Car', zh: '車', emoji: '🚗' },
                    { en: 'Bus', zh: '巴士', emoji: '🚌' },
                    { en: 'Sun', zh: '太陽', emoji: '☀️' },
                    { en: 'Moon', zh: '月亮', emoji: '🌙' }
                ]
            }
        };

        for(let i=3; i<=10; i++) { vocabDB[i] = vocabDB[1]; } 

        let unlockedLevels = 1;
        let currentLevel = 1;
        let questionIndex = 0;
        let currentLevelData = null;

        // --- 導航邏輯 ---
        function navTo(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'level-screen') renderLevels();
            
            // 重置精靈狀態
            const poke = document.getElementById('mystery-poke');
            poke.classList.remove('revealed');
        }

        // --- 渲染關卡 ---
        function renderLevels() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const isUnlocked = i <= unlockedLevels;
                const emoji = vocabDB[i].reward;
                
                grid.innerHTML += `
                    <div class="level-card ${isUnlocked ? '' : 'locked'}" onclick="if(${isUnlocked}) startLevel(${i})">
                        <div class="level-num">區域 ${i}</div>
                        <div style="font-size: 3rem; filter: ${isUnlocked ? 'none' : 'brightness(0)'}">${emoji}</div>
                    </div>
                `;
            }
        }

        // --- 開始關卡 ---
        function startLevel(level) {
            currentLevel = level;
            currentLevelData = vocabDB[level];
            questionIndex = 0;
            
            document.getElementById('mystery-poke').innerText = currentLevelData.reward;
            document.getElementById('rocket-text').innerText = "既然你誠心誠意咁發問... 準備好未？";
            
            navTo('game-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const data = currentLevelData.words[questionIndex];
            document.getElementById('card-name').innerText = data.en;
            document.getElementById('card-emoji').innerText = data.emoji;
            
            // 更新進度條
            const progress = (questionIndex / currentLevelData.words.length) * 100;
            document.getElementById('prog-bar').style.width = progress + '%';
        }

        // --- 學習模式：文字轉語音 (TTS) ---
        function playVoice() {
            const word = document.getElementById('card-name').innerText;
            const msg = new SpeechSynthesisUtterance(word);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
            document.getElementById('rocket-text').innerText = "聽清楚喇！就係咁讀！";
        }

        // --- 考核模式：語音轉文字 (STT) ---
        function startListening() {
            if(!recognition) return;
            
            const btn = document.getElementById('mic-btn');
            const status = document.getElementById('mic-status');
            
            btn.classList.add('listening');
            status.innerText = "聆聽中... 請講嘢！";
            status.style.color = "var(--poke-red)";

            recognition.start();

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase().trim();
                // 移除標點符號方便比對
                const cleanTranscript = transcript.replace(/[.,!?]/g, '');
                checkAnswer(cleanTranscript);
            };

            recognition.onspeechend = () => {
                recognition.stop();
                btn.classList.remove('listening');
                status.innerText = "點擊咪高峰，大聲讀出英文！";
                status.style.color = "#666";
            };

            recognition.onerror = (event) => {
                btn.classList.remove('listening');
                status.innerText = "收唔到音呀，再試下？";
                console.error(event.error);
            };
        }

        // --- 檢查語音答案 ---
        function checkAnswer(spokenWord) {
            const correctWord = currentLevelData.words[questionIndex].en.toLowerCase();
            
            // 寬鬆比對 (只要講嘅嘢包含個目標英文字就當啱)
            if (spokenWord.includes(correctWord)) {
                document.getElementById('rocket-text').innerText = `「${spokenWord}」？算你叻，答啱咗！`;
                
                questionIndex++;
                if (questionIndex >= currentLevelData.words.length) {
                    revealPokemon();
                } else {
                    setTimeout(loadQuestion, 1000);
                }
            } else {
                document.getElementById('card-panel').classList.add('shake');
                document.getElementById('rocket-text').innerText = `你講「${spokenWord}」？聽唔清喎，再讀過！`;
                setTimeout(() => document.getElementById('card-panel').classList.remove('shake'), 400);
            }
        }

        // --- 剪影解鎖與過關 ---
        function revealPokemon() {
            document.getElementById('rocket-text').innerText = "白洞，白色的明天在等著我們... 竟然解鎖咗？！";
            document.getElementById('flash-bg').classList.add('flash-active');
            
            // 進度條全滿
            document.getElementById('prog-bar').style.width = '100%';

            setTimeout(() => {
                document.getElementById('flash-bg').classList.remove('flash-active');
                
                // 黑影變光 (移除 filter)
                const poke = document.getElementById('mystery-poke');
                poke.classList.add('revealed');
                
                setTimeout(() => {
                    alert(`恭喜！你成功解鎖咗【${currentLevelData.rewardName}】！`);
                    if(currentLevel >= unlockedLevels && currentLevel < 10) unlockedLevels++;
                    navTo('level-screen');
                }, 2000);
            }, 800);
        }
    </script>
</body>
</html>
