<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小智的識字對戰</title>
    <style>
        :root {
            --card-yellow: #fbd743;
            --card-blue: #3e5ba9;
            --hp-green: #4caf50;
        }

        body {
            margin: 0;
            background: radial-gradient(circle, #5da9ad 0%, #333 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: '微軟正黑體', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* 小智 Buddy */
        #ash-buddy {
            position: fixed;
            bottom: 20px;
            right: 20px;
            text-align: center;
            transition: transform 0.3s;
        }
        .ash-sprite { font-size: 80px; } 
        .ash-speech {
            background: white;
            color: black;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
            font-weight: bold;
        }

        /* 寶可夢卡牌設計 */
        .pokemon-card {
            width: 300px;
            height: 420px;
            background: var(--card-yellow);
            border: 12px solid var(--card-yellow);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #333;
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
            transition: transform 0.1s;
            cursor: pointer;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .hp-text { color: #e91e63; font-size: 0.9rem; }

        .card-image {
            width: 90%;
            height: 180px;
            background: #eee;
            margin: 0 auto;
            border: 4px solid #888;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
        }

        .card-body {
            padding: 15px;
            text-align: center;
        }

        .move-box {
            border-top: 1px solid #ccc;
            margin-top: 10px;
            padding-top: 10px;
            font-style: italic;
        }

        /* 選擇按鈕 */
        .options {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-move {
            background: white;
            border: 3px solid var(--card-blue);
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-move:hover { background: #eee; transform: scale(1.05); }

        /* 進化與特效 */
        .shake { animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .badges-gallery {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        .badge { width: 40px; height: 40px; filter: grayscale(1); opacity: 0.3; }
        .badge.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }

    </style>
</head>
<body>

    <div class="badges-gallery" id="badges">
        <!-- 10 個勳章 -->
        <span class="badge" id="b1">🏅</span><span class="badge" id="b2">🎖️</span>
        <span class="badge" id="b3">🏆</span><span class="badge" id="b4">💠</span>
    </div>

    <div id="card-container" style="perspective: 1000px; margin-top: 50px;">
        <div class="pokemon-card" id="main-card" onclick="playVoice()">
            <div class="card-header">
                <span>基礎</span>
                <span id="card-name">Apple</span>
                <span class="hp-text">HP <span id="hp-val">50</span></span>
            </div>
            <div class="card-image">🍎</div>
            <div class="card-body">
                <strong>[屬性：食物]</strong>
                <div class="move-box">
                    這是一個充滿營養的招式，點擊卡片可聆聽讀音。
                </div>
            </div>
        </div>
    </div>

    <div class="options">
        <button class="btn-move" onclick="check(true)">蘋果</button>
        <button class="btn-move" onclick="check(false)">香蕉</button>
    </div>

    <div id="ash-buddy">
        <div class="ash-speech" id="ash-text">準備好戰鬥未？</div>
        <div class="ash-sprite">👦🏻</div>
    </div>

    <script>
        let hp = 50;
        let level = 1;

        // 3D 傾斜效果
        const card = document.getElementById('main-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // 語音功能
        function playVoice() {
            const msg = new SpeechSynthesisUtterance(document.getElementById('card-name').innerText);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        // 檢查答案邏輯
        function check(isCorrect) {
            if (isCorrect) {
                hp -= 10;
                document.getElementById('hp-val').innerText = hp;
                document.getElementById('ash-text').innerText = "好嘢！效果超群！";
                
                if (hp <= 0) {
                    evolve();
                }
            } else {
                card.classList.add('shake');
                document.getElementById('ash-text').innerText = "哎呀！仲差少少！";
                if (window.navigator.vibrate) window.navigator.vibrate(200); // 手機震動回饋
                setTimeout(() => card.classList.remove('shake'), 300);
            }
        }

        // 進化動畫與重置
        function evolve() {
            document.getElementById('ash-text').innerText = "咩話？字詞正在進化！";
            const badge = document.getElementById('b' + level);
            if(badge) badge.classList.add('active'); 
            
            card.style.filter = "brightness(3)";
            setTimeout(() => {
                level++;
                hp = 50;
                document.getElementById('hp-val').innerText = hp;
                card.style.filter = "brightness(1)";
                alert("恭喜！你收服咗呢個等級嘅所有生字！");
                document.getElementById('ash-text').innerText = "下一個對手出現喇！";
            }, 1000);
        }
    </script>
</body>
</html>
